{% extends "base.html" %}
{% block title %}가용자산 계산기{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="fw-bold mb-0"><i class="bi bi-calculator me-2 text-primary"></i>가용자산 계산기</h2>
</div>

<div class="row g-4">
  <!-- 왼쪽: 자산 목록 (Tree View) -->
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3">
        <i class="bi bi-list-ul me-2 text-primary"></i>자산 목록
      </div>
      <div class="card-body">
        <p class="text-muted small mb-3">전체 카테고리 또는 세부 항목을 드래그하여 계산기에 추가하세요.</p>
        
        <div id="asset-tree" class="accordion accordion-flush">
          <!-- JS로 채워짐 -->
          <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 계산기 -->
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white fw-semibold border-0 pt-3 d-flex justify-content-between align-items-center">
        <span class="fw-bold"><i class="bi bi-plus-circle me-2 text-success"></i>계산 바구니</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="resetCalculator()">
          <i class="bi bi-arrow-counterclockwise me-1"></i>초기화
        </button>
      </div>
      <div class="card-body">
        <div id="calc-drop-zone" class="calc-drop-zone rounded border-2 border-dashed d-flex flex-column gap-2 p-3 bg-light mb-4" style="min-height: 400px;">
          <div class="text-muted my-auto text-center drop-placeholder">
            <i class="bi bi-box-arrow-in-down fs-1 d-block mb-2 opacity-25"></i>
            자산을 여기에 드롭하세요
          </div>
        </div>

        <div class="card bg-primary-subtle border-0">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="text-primary small fw-semibold mb-1">총 가용자산 합계</div>
              <div class="fs-3 fw-bold text-primary" id="calc-total">0원</div>
            </div>
            <i class="bi bi-wallet2 fs-1 text-primary opacity-25"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block styles %}
<style>
.calc-item {
  cursor: grab;
  padding: 10px 14px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 2px;
  transition: all 0.2s;
}
.calc-item:hover {
  background: var(--primary-light);
  border-color: var(--primary);
  transform: translateX(4px);
}
.calc-item:active { cursor: grabbing; }
.calc-item.dragging { opacity: 0.5; }

.calc-drop-zone {
  transition: all 0.2s;
}
.calc-drop-zone.drag-over {
  background-color: var(--primary-light) !important;
  border-color: var(--primary) !important;
  border-style: solid !important;
}

.accordion-button:not(.collapsed) {
  background-color: var(--primary-light);
  color: var(--primary);
}

.cursor-pointer { cursor: pointer; }

/* Grip handle for category dragging */
.bi-grip-vertical {
  cursor: grab;
}
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/analysis_calculator.js"></script>
{% endblock %}
