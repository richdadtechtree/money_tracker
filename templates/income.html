{% extends "base.html" %}
{% block title %}수입 관리{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0"><i class="bi bi-cash-coin me-2 text-success"></i>수입 관리</h2>
  <button class="btn btn-success" onclick="openAddModal()">
    <i class="bi bi-plus-lg me-1"></i>행 추가
  </button>
</div>

<!-- 필터 -->
<div class="card border-0 shadow-sm mb-3">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-auto">
        <select id="filterYear" class="form-select form-select-sm"></select>
      </div>
      <div class="col-auto">
        <select id="filterMonth" class="form-select form-select-sm"></select>
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-primary" onclick="grid.load()">조회</button>
      </div>
      <div class="col-auto ms-auto">
        <span class="text-muted small">합계: <strong class="text-success" id="totalAmount">0원</strong></span>
      </div>
    </div>
  </div>
</div>

<!-- 그리드 -->
<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0" id="dataTable">
        <thead class="table-light">
          <tr>
            <th>날짜</th>
            <th>카테고리</th>
            <th>항목명</th>
            <th class="text-end">금액</th>
            <th>메모</th>
            <th class="text-center">삭제</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── 수입 추가 모달 ───────────────────────────────────────── -->
<div class="modal fade" id="addIncomeModal" tabindex="-1" aria-labelledby="addIncomeModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="addIncomeModalLabel">
          <i class="bi bi-plus-circle me-2"></i>수입 추가
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <!-- 날짜 -->
          <div class="col-12">
            <label class="form-label fw-semibold">날짜 <span class="text-danger">*</span></label>
            <input type="date" id="mi_date" class="form-control">
          </div>
          <!-- 카테고리 -->
          <div class="col-12">
            <label class="form-label fw-semibold">카테고리</label>
            <select id="mi_category" class="form-select">
              <option value="">선택 안함</option>
              <option>급여</option>
              <option>부수입</option>
              <option>사업소득</option>
              <option>투자수익</option>
              <option>임대소득</option>
              <option>배당금</option>
              <option>기타</option>
            </select>
          </div>
          <!-- 통화 선택 -->
          <div class="col-12">
            <label class="form-label fw-semibold">통화</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="mi_currency" id="mi_currency_krw" value="KRW" checked onchange="onCurrencyChange()">
                <label class="form-check-label" for="mi_currency_krw">원화 (KRW)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="mi_currency" id="mi_currency_usd" value="USD" onchange="onCurrencyChange()">
                <label class="form-check-label" for="mi_currency_usd">달러 (USD)</label>
              </div>
            </div>
          </div>
          <!-- 적용 환율 (달러 선택 시 노출) -->
          <div class="col-12 d-none" id="mi_exchange_rate_div">
            <label class="form-label fw-semibold">적용 환율 <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="text" id="mi_exchange_rate" class="form-control" placeholder="1,380" inputmode="decimal" oninput="fmtExchangeRate(this); updateConvertedKrw()">
              <span class="input-group-text">원/달러</span>
            </div>
          </div>
          <!-- 항목명 -->
          <div class="col-12">
            <label class="form-label fw-semibold">항목명</label>
            <input type="text" id="mi_name" class="form-control" placeholder="항목명 입력">
          </div>
          <!-- 금액 -->
          <div class="col-12">
            <label class="form-label fw-semibold" id="mi_amount_label">금액 <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="text" id="mi_amount" class="form-control" placeholder="0" inputmode="decimal" oninput="updateConvertedKrw()">
              <span class="input-group-text" id="mi_amount_addon">원</span>
            </div>
            <div id="mi_krw_converted_help" class="form-text text-success fw-semibold mt-1 d-none"></div>
          </div>
          <!-- 메모 -->
          <div class="col-12">
            <label class="form-label fw-semibold">메모</label>
            <input type="text" id="mi_memo" class="form-control" placeholder="메모 (선택)">
          </div>

          <!-- ── 반복 수입 섹션 ── -->
          <div class="col-12">
            <hr class="my-1">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="mi_recurring" role="switch">
                <label class="form-check-label fw-semibold" for="mi_recurring">
                  <i class="bi bi-arrow-repeat me-1 text-success"></i>매월 반복
                </label>
              </div>
            </div>
            <!-- 반복 옵션 (토글 시 표시) -->
            <div id="recurringOptions" class="ps-2 d-none">
              <label class="form-label text-muted small mb-1">반복 개월 수</label>
              <div class="d-flex align-items-center gap-2">
                <input type="number" id="mi_repeat_months" class="form-control form-control-sm"
                       style="width:90px" min="2" max="120" value="12">
                <span class="text-muted small">개월 동안 반복</span>
              </div>
              <div id="recurringPreview" class="mt-2 p-2 bg-success bg-opacity-10 rounded small text-success d-none">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-success" onclick="saveIncome()">
          <i class="bi bi-check-lg me-1"></i>저장
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const today = new Date();
initYearMonthFilters('filterYear', 'filterMonth', today.getFullYear(), today.getMonth() + 1);

const grid = new GridTable({
  tableId: 'dataTable',
  columns: [
    { key: 'date',     type: 'date' },
    { key: 'category', type: 'select',
      options: ['급여','부수입','사업소득','투자수익','임대소득','배당금','기타'],
      render: v => v ? `<span class="badge bg-success-subtle text-success">${v}</span>` : '-' },
    { key: 'name',   type: 'text' },
    { key: 'amount', type: 'number', align: 'end',
      render: (v, r) => {
        if (r && r.currency === 'USD') {
          return `<span class="fw-semibold text-success" title="환율: ${fmt(r.exchange_rate)}원">$${Number(r.original_amount).toFixed(2)}<br><small class="text-muted" style="font-size: 0.75rem;">(${fmt(v)}원)</small></span>`;
        }
        return `<span class="fw-semibold text-success">${fmt(v)}원</span>`;
      }
    },
    { key: 'memo',   type: 'text' },
  ],
  apiUrl: '/api/income',
  getQueryParams: () => {
    const y = document.getElementById('filterYear').value;
    const m = document.getElementById('filterMonth').value;
    return `year=${y}&month=${m}`;
  },
  onLoad: rows => {
    const total = rows.reduce((s, r) => s + r.amount, 0);
    document.getElementById('totalAmount').textContent = fmt(total) + '원';
  },
});

grid.load();

/* ── 모달 열기 ─────────────────────────────────── */
let addModal;
function openAddModal() {
  if (!addModal) addModal = new bootstrap.Modal(document.getElementById('addIncomeModal'));

  // 기본값 초기화
  document.getElementById('mi_date').value     = new Date().toISOString().split('T')[0];
  document.getElementById('mi_category').value = '';
  document.getElementById('mi_name').value     = '';
  document.getElementById('mi_amount').value   = '';
  document.getElementById('mi_memo').value     = '';
  document.getElementById('mi_currency_krw').checked = true;
  document.getElementById('mi_exchange_rate').value   = '';
  document.getElementById('mi_recurring').checked = false;
  document.getElementById('mi_repeat_months').value = 12;
  document.getElementById('recurringOptions').classList.add('d-none');
  document.getElementById('recurringPreview').classList.add('d-none');
  onCurrencyChange();

  addModal.show();
  setTimeout(() => document.getElementById('mi_date').focus(), 300);
}

/* ── 반복 토글 ─────────────────────────────────── */
document.getElementById('mi_recurring').addEventListener('change', function () {
  const opts = document.getElementById('recurringOptions');
  if (this.checked) {
    opts.classList.remove('d-none');
    updatePreview();
  } else {
    opts.classList.add('d-none');
    document.getElementById('recurringPreview').classList.add('d-none');
  }
});

/* 날짜·개월 수 변경 시 미리보기 갱신 */
['mi_date', 'mi_repeat_months'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (document.getElementById('mi_recurring').checked) updatePreview();
  });
});

function updatePreview() {
  const dateStr = document.getElementById('mi_date').value;
  const months  = parseInt(document.getElementById('mi_repeat_months').value) || 0;
  const preview = document.getElementById('recurringPreview');
  if (!dateStr || months < 2) { preview.classList.add('d-none'); return; }

  const base = new Date(dateStr + 'T00:00:00');
  const labels = [];
  for (let i = 0; i < months; i++) {
    const d = new Date(base.getFullYear(), base.getMonth() + i, base.getDate());
    labels.push(`${d.getFullYear()}년 ${d.getMonth()+1}월`);
  }
  preview.innerHTML = `<i class="bi bi-info-circle me-1"></i>${labels[0]} ~ ${labels[labels.length-1]} (${months}개월)`;
  preview.classList.remove('d-none');
}

/* ── 금액 콤마 포맷 ────────────────────────────── */
document.getElementById('mi_amount').addEventListener('input', function () {
  const sel   = this.selectionStart;
  const prev  = this.value;
  const clean = prev.replace(/[^\d.]/g, '');
  const parts = clean.split('.');
  const intFmt = (parts[0] || '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const next  = parts.length > 1 ? intFmt + '.' + parts[1] : intFmt;
  this.value  = next;
  try { this.setSelectionRange(sel + next.length - prev.length, sel + next.length - prev.length); } catch {}
});

/* ── 저장 ───────────────────────────────────────── */
async function saveIncome() {
  const dateVal   = document.getElementById('mi_date').value;
  const amountRaw = document.getElementById('mi_amount').value.replace(/,/g, '');
  const amount    = parseFloat(amountRaw) || 0;

  if (!dateVal)    { alert('날짜를 입력해주세요.'); return; }
  if (amount <= 0) { alert('금액을 입력해주세요.'); return; }

  const currency  = document.getElementById('mi_currency_usd').checked ? 'USD' : 'KRW';
  const exRateRaw = document.getElementById('mi_exchange_rate').value.replace(/,/g, '');
  const exchangeRate = parseFloat(exRateRaw) || 1.0;

  if (currency === 'USD' && exchangeRate <= 0) {
    alert('환율을 입력해주세요.');
    return;
  }

  const isRecurring   = document.getElementById('mi_recurring').checked;
  const repeatMonths  = parseInt(document.getElementById('mi_repeat_months').value) || 1;

  const payload = {
    date:           dateVal,
    category:       document.getElementById('mi_category').value,
    name:           document.getElementById('mi_name').value,
    memo:           document.getElementById('mi_memo').value,
    amount:         currency === 'USD' ? Math.round(amount * exchangeRate) : amount,
    currency:       currency,
    exchange_rate:  exchangeRate,
    original_amount: amount,
    is_recurring:   isRecurring,
    repeat_months:  isRecurring ? repeatMonths : 1,
  };

  const saveBtn = document.querySelector('#addIncomeModal .btn-success');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

  const res = await fetchJSON('/api/income', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  saveBtn.disabled = false;
  saveBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i>저장';

  if (res) {
    addModal.hide();
    await grid.load();
    if (isRecurring && repeatMonths > 1) {
      // 토스트 형태 알림
      showToast(`${repeatMonths}개월치 수입이 등록되었습니다.`, 'success');
    }
  }
}

/* ── 통화 변경 및 계산 ── */
async function onCurrencyChange() {
  const isUsd = document.getElementById('mi_currency_usd').checked;
  const exRateDiv = document.getElementById('mi_exchange_rate_div');
  const amountAddon = document.getElementById('mi_amount_addon');
  const amountLabel = document.getElementById('mi_amount_label');
  
  if (isUsd) {
    exRateDiv.classList.remove('d-none');
    amountAddon.textContent = '달러 ($)';
    amountLabel.innerHTML = '달러 금액 <span class="text-danger">*</span>';
    
    const rateInput = document.getElementById('mi_exchange_rate');
    if (!rateInput.value) {
      const res = await fetchJSON('/api/exchange-rate');
      if (res && res.rate) {
        rateInput.value = fmt(res.rate);
      }
    }
  } else {
    exRateDiv.classList.add('d-none');
    amountAddon.textContent = '원';
    amountLabel.innerHTML = '금액 <span class="text-danger">*</span>';
    document.getElementById('mi_krw_converted_help').classList.add('d-none');
  }
  updateConvertedKrw();
}

function updateConvertedKrw() {
  const isUsd = document.getElementById('mi_currency_usd').checked;
  const help = document.getElementById('mi_krw_converted_help');
  if (!isUsd) {
    help.classList.add('d-none');
    return;
  }
  
  const amountRaw = document.getElementById('mi_amount').value.replace(/,/g, '');
  const amount = parseFloat(amountRaw) || 0;
  const rateRaw = document.getElementById('mi_exchange_rate').value.replace(/,/g, '');
  const rate = parseFloat(rateRaw) || 0;
  
  if (amount > 0 && rate > 0) {
    const krw = Math.round(amount * rate);
    help.textContent = `예상 원화 환산액: ${fmt(krw)}원`;
    help.classList.remove('d-none');
  } else {
    help.classList.add('d-none');
  }
}

function fmtExchangeRate(el) {
  const clean = el.value.replace(/[^\d.]/g, '');
  const parts = clean.split('.');
  const intFmt = (parts[0] || '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  el.value = parts.length > 1 ? intFmt + '.' + parts[1] : intFmt;
}

/* 모달에서 Enter 키 저장 */
document.getElementById('addIncomeModal').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'BUTTON') {
    e.preventDefault();
    saveIncome();
  }
});

/* ── 토스트 헬퍼 ────────────────────────────────── */
function showToast(msg, type = 'success') {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999';
  wrap.innerHTML = `
    <div class="toast align-items-center text-bg-${type} border-0 show" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold">${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('div[style]').remove()"></button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 4000);
}
</script>
{% endblock %}
