<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | 개인 금융 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 20px; padding: 48px 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); max-width: 380px; width: 100%; text-align: center; }
    .app-icon { width: 64px; height: 64px; background: #2563EB; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.8rem; color: #fff; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 12px 20px; font-size: 0.95rem; font-weight: 600; color: #0F172A; text-decoration: none; transition: box-shadow 0.15s, border-color 0.15s; width: 100%; }
    .btn-google:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.10); border-color: #93C5FD; color: #0F172A; }
    .btn-google img { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="app-icon"><i class="bi bi-piggy-bank-fill"></i></div>
    <h4 class="fw-bold mb-1">개인 금융 관리</h4>
    <p class="text-muted small mb-4">내 자산을 한눈에 관리하세요</p>
    <a href="/auth/google" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google로 로그인
    </a>
    <p class="text-muted mt-4 mb-0" style="font-size:0.78rem">로그인하면 계정별로 데이터가 안전하게 분리됩니다.</p>
  </div>
</body>
</html>
